name: Timestamp Integrity Validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate-timestamps:
    name: Validate Timestamp Integrity
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.8.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Timestamp Integrity
        run: pnpm validate:timestamps
        continue-on-error: false

      - name: Lint Clock Usage
        run: pnpm lint:clock
        continue-on-error: false

      - name: Validate Blueprint Structure
        run: pnpm blueprint:check
        env:
          ENFORCEMENT_STRICT: "1" # Phase 80%: strict enforcement on main
        continue-on-error: false

      - name: Validate Golden Tasks
        run: pnpm golden-tasks:check
        env:
          ENFORCEMENT_STRICT: "1" # Phase 80%: strict enforcement on main
        continue-on-error: false

      - name: Validate PR Governance Schema
        run: pnpm pr:check
        env:
          ENFORCEMENT_STRICT: "1" # Phase 80%: strict enforcement on main
        continue-on-error: false

      - name: Verify No Governance Bypass
        run: pnpm verify:no-bypass
        continue-on-error: false

      - name: Check Emergency Bypass Label (if failed)
        if: failure()
        run: |
          if [[ "${{ contains(github.event.pull_request.labels.*.name, 'emergency-governance-bypass') }}" == "true" ]]; then
            echo "Emergency bypass label detected. Not failing build."
            exit 0
          else
            echo "No emergency bypass label. Build failed due to governance violations."
            exit 1
          fi

